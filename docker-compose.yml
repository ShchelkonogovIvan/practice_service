services:
  mailpit:
    image: axllent/mailpit:v1.30
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-practice}
      POSTGRES_USER: ${POSTGRES_USER:-practice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-practice}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-practice} -d ${POSTGRES_DB:-practice}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://practice:practice@db:5432/practice?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-deploy-2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      PORT: ${PORT:-4000}
      UPLOADS_DIR: /app/uploads
      TEMPLATES_DIR: /app/templates
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-Практика <practice@localhost>}
    ports:
      - "4000:4000"
    volumes:
      - report_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  report_uploads:
